[build]
# whisper.cpp's Vulkan shader generator creates very deep MSBuild paths. Keep
# the Cargo target root short so Windows file-tracking logs stay under limits.
target-dir = "C:\\mu-target"
[env]
CMAKE = { value = "C:\\Program Files\\Microsoft Visual Studio\\18\\Community\\Common7\\IDE\\CommonExtensions\\Microsoft\\CMake\\CMake\\bin\\cmake.exe", force = false }
VULKAN_SDK = { value = "C:\\VulkanSDK\\1.4.350.0", force = false }
