  <!-- Title bar content -->
  <g transform="translate(320, 11)">
    <rect width="18" height="18" rx="5" fill="#141414" stroke="#2C2C2C" stroke-width="1"/>
    <svg x="3.5" y="3.5" width="11" height="11" viewBox="0 0 48 48" fill="none">
      <g color="url(#logoGrad)" fill="currentColor" stroke="currentColor">
        <path fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M 7 16 V 31 A 4 4 0 0 0 11 35 H 22 Q 26 35 28 31.5 M 7 16 A 4 4 0 0 1 11 12 H 30 A 4 4 0 0 1 34 16 V 24" />
        <path stroke="none" d="M 35 23 Q 35 31 42 31 Q 35 31 35 39 Q 35 31 28 31 Q 35 31 35 23 Z" />
        <rect x="12" y="17" width="17" height="2.5" rx="1.25" stroke="none" />
        <rect x="12" y="22" width="14" height="2.5" rx="1.25" stroke="none" />
        <rect x="12" y="27" width="9" height="2.5" rx="1.25" stroke="none" />
      </g>
    </svg>
    <text x="26" y="13" class="title-text">MeshUtility Suite</text>
  </g>

  <!-- Window dots (right) -->
